<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>KeepATrack · Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />


     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
     <!-- Google Fonts: Plus Jakarta Sans (clean, rounded-ish) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="app-header-inner">
          <div class="brand">
            
            <div class="brand-logo" id="logo">
              <!-- <img src="{{ url_for('static', filename='logo.jpg') }}" alt=""> -->
            </div>

            <script>
  const logo = "{{ config.site_logo }}";
  
  document.getElementById("logo").style.background = `url(${logo})`;
  document.getElementById("logo").style.backgroundRepeat = "round";
  
</script>  
            <div>
              <div class="brand-text-main">{{ config.site_name }}</div>
              <div class="brand-text-sub">Minimal Expense Tracker</div>
            </div>
          </div>

          <nav class="nav-links">
  {% if current_user.is_authenticated %}
    <a href="{{ url_for('index') }}"
       class="{% if request.path == '/' %}nav-active{% endif %}">
      Dashboard
    </a>
    <a href="{{ url_for('transactions_page') }}"
       class="{% if request.path.startswith('/transactions') %}nav-active{% endif %}">
      Transactions
    </a>
    <a href="{{ url_for('goals_page') }}"
       class="{% if request.path.startswith('/goals') %}nav-active{% endif %}">
      Goals
    </a>
    <a href="{{ url_for('logout') }}" class="nav-logout">Logout</a>
  {% else %}
    <a href="{{ url_for('login') }}"
       class="{% if request.path == '/login' %}nav-active{% endif %}">
      Login
    </a>
    <a href="{{ url_for('register') }}"
       class="{% if request.path == '/register' %}nav-active{% endif %}">
      Sign up
    </a>
  {% endif %}



<div class="theme-switcher">
  <input type="radio" id="theme-light" name="theme" value="light" checked>
  <label for="theme-light">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    Light
  </label>

  <input type="radio" id="theme-dark" name="theme" value="dark">
  <label for="theme-dark">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    Dark
  </label>
</div>

</nav>
        </div>
      </header>


      <main class="app-main">
        {% block content %}{% endblock %}
      </main>
   
    </div>

    {% block scripts %}{% endblock %}
<script>
window.addEventListener("pageshow", function (event) {
    if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
        window.location.reload();
    }
});



</script>


<script>
  const themeRadios = document.querySelectorAll('input[name="theme"]');
  
  // Listen for changes on the radio buttons
  themeRadios.forEach(radio => {
    radio.addEventListener('change', (e) => {
      const selectedTheme = e.target.value;
      
      // Apply the theme to the HTML tag
      if (selectedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      
      // Optional: Save preference to localStorage so it remembers on reload
      localStorage.setItem('app-theme', selectedTheme);
    });
  });

  // Optional: Check for saved theme on page load
  const savedTheme = localStorage.getItem('app-theme');
  if (savedTheme === 'dark') {
    document.getElementById('theme-dark').checked = true;
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
  </body>
</html>
